title: "Database from scratch"
subtitle: "Пишем database на Go"
description: "Серия статей о том, как устроены LSM-деревья, и полная реализация на Go"
url: "https://edylcrm.github.io"
baseurl: "/db-from-scratch"

remote_theme: mmistakes/minimal-mistakes

locale: "ru-RU"

highlighter: rouge
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      toc: true
      toc_sticky: true
